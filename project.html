<style>

:root {
  --blue:#0259de; --blue-light:#3a7ff0; --black:#000; --white:#FFF;
  --bg:#000; --surface:#111; --text:#FFF; --text-muted:#888;
  --border:rgba(255,255,255,0.08);
  --font-main:'Switzer','DM Sans',sans-serif;
  --font-mono:'Space Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-main);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 24px}

.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:14px 0;background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--blue)}
.nav .inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.nav-logo img{height:140px;width:auto;filter:brightness(0) invert(1);margin:-40px 0}
.nav-back{font-size:14px;font-weight:500;color:var(--text-muted);display:flex;align-items:center;gap:6px;transition:color 0.2s}
.nav-back:hover{color:var(--white)}

.project-hero{padding:120px 24px 60px;text-align:center}
.project-badge{font-family:var(--font-mono);font-size:11px;color:var(--blue);background:rgba(2,89,222,0.1);padding:5px 14px;border-radius:6px;display:inline-block;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.project-hero h1{font-size:clamp(32px,5vw,52px);font-weight:700;line-height:1.1;margin-bottom:16px}
.project-hero p{font-size:17px;color:var(--text-muted);max-width:600px;margin:0 auto;line-height:1.7}

.project-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px 24px;max-width:900px;margin:0 auto}
.meta-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.meta-label{font-family:var(--font-mono);font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.meta-value{font-size:15px;font-weight:500}

.project-section{padding:60px 24px}
.project-section h2{font-size:28px;font-weight:700;margin-bottom:20px}
.project-section p{font-size:16px;color:var(--text-muted);line-height:1.8;margin-bottom:16px}
.project-section ul{list-style:none;margin-top:12px}
.project-section li{font-size:15px;color:var(--text-muted);padding:8px 0;display:flex;align-items:center;gap:10px}
.project-section li::before{content:'→';color:var(--blue);font-weight:700}

.project-cta{text-align:center;padding:60px 24px 80px}
.project-cta h2{font-size:32px;font-weight:700;margin-bottom:12px}
.project-cta p{color:var(--text-muted);margin-bottom:28px}
.btn-primary{background:var(--blue);color:var(--white);padding:16px 40px;border-radius:10px;font-size:16px;font-weight:700;display:inline-block;transition:background 0.15s,transform 0.15s}
.btn-primary:hover{background:var(--blue-light);transform:scale(1.03)}
.btn-behance{background:var(--surface);color:var(--white);padding:14px 32px;border-radius:10px;font-size:15px;font-weight:500;display:inline-block;border:1px solid var(--border);margin-left:12px;transition:border-color 0.2s}
.btn-behance:hover{border-color:var(--blue)}

.footer{padding:32px 24px;border-top:1px solid var(--border);text-align:center}
.footer p{font-size:12px;color:var(--text-muted)}

.project-gallery{padding:20px 24px 60px}
.project-gallery h2{font-size:28px;font-weight:700;margin-bottom:24px;text-align:center}
.gallery-grid{display:flex;flex-direction:column;gap:12px;max-width:900px;margin:0 auto}
.gallery-grid img{width:100%;border-radius:10px;display:block}

@media(max-width:768px){
  .project-meta{grid-template-columns:1fr}
}
</style>
</head>
